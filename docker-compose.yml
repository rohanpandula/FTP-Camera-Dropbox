services:
  ftp:
    image: stilliard/pure-ftpd:latest
    container_name: camera-ftp
    environment:
      PUBLICHOST: ${PUBLICHOST:-127.0.0.1}
      FTP_USER_NAME: ${FTP_USER:-cameras}
      FTP_USER_PASS: ${FTP_PASS:-cameras}
      FTP_USER_HOME: /data/incoming
      FTP_PASSIVE_PORTS: "30000:30009"
    ports:
      - "21:21"
      - "30000-30009:30000-30009"
    volumes:
      # Option A (named volume — Docker manages storage):
      - camera_data:/data
      # Option B (bind mount — explicit host path, easier to access files directly):
      # Uncomment the line below and comment out Option A:
      # - ${DATA_DIR:-./data}:/data
    networks:
      - camera_net
    restart: unless-stopped

  sorter:
    build: .
    container_name: camera-sorter
    environment:
      INCOMING: /data/incoming
      SORTED: /data/sorted
      QUARANTINE: /data/quarantine
      STABLE_WAIT: ${STABLE_WAIT:-60}
      NOTIFY_INTERVAL: ${NOTIFY_INTERVAL:-300}
      TG_CONFIG: /etc/telegram.json
    volumes:
      # Must match whichever option you chose above for `ftp`:
      - camera_data:/data
      # - ${DATA_DIR:-./data}:/data
      #
      # Optional: mount telegram config if you have it.
      # The sorter skips notifications gracefully if this file is absent.
      # - ./telegram.json:/etc/telegram.json:ro
    networks:
      - camera_net
    depends_on:
      - ftp
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Optional: Frame.io Camera-to-Cloud mirror
  # ---------------------------------------------------------------------------
  # Receives Frame.io V4 webhooks, downloads the asset to /data/incoming, then
  # (optionally) deletes it from Frame.io to keep the free-tier quota clear.
  # The sorter picks it up exactly like an FTP upload — same incoming path.
  #
  # Opt-in only: this service is in the `frameio` profile, so plain
  # `docker compose up -d` leaves it off. To include it:
  #
  #     docker compose --profile frameio up -d
  #
  # You'll need a public HTTPS endpoint pointing at this container's :8000
  # (Cloudflare Tunnel, ngrok, Caddy + Let's Encrypt — whatever fits).
  # See frameio-mirror/README.md for the full setup.
  # ---------------------------------------------------------------------------
  frameio-mirror:
    build: ./frameio-mirror
    container_name: frameio-mirror
    profiles: ["frameio"]
    environment:
      INCOMING_DIR: /data/incoming
      # FRAMEIO_WEBHOOK_SECRET is REQUIRED for any public deployment — the service
      # fails closed (503) on unsigned webhooks. ADOBE_* are required to download
      # and delete assets (the V4 webhook payload is just an ID — there is no
      # pre-signed-URL shortcut; every download goes through the authed API).
      FRAMEIO_WEBHOOK_SECRET: ${FRAMEIO_WEBHOOK_SECRET:-}
      ADOBE_CLIENT_ID: ${ADOBE_CLIENT_ID:-}
      ADOBE_CLIENT_SECRET: ${ADOBE_CLIENT_SECRET:-}
      # offline_access is REQUIRED for the OAuth Web App refresh-token flow.
      ADOBE_SCOPES: ${ADOBE_SCOPES:-openid,AdobeID,additional_info.roles,offline_access,profile,email}
      # Optional: gate /oauth/start on a shared secret (?setup=...) for public endpoints.
      OAUTH_SETUP_SECRET: ${OAUTH_SETUP_SECRET:-}
      OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-}
    volumes:
      # Same volume as ftp+sorter — downloads land where the sorter is watching:
      - camera_data:/data
      # - ${DATA_DIR:-./data}:/data
      #
      # Optional: mount a frameio.json instead of using env vars (same pattern
      # as telegram.json). Env vars take precedence if both are set.
      # - ./frameio.json:/etc/frameio.json:ro
      #
      # Optional: mount the same telegram.json the sorter uses → mirror sends
      # throttled ⚠️ Telegram alerts on failure (HTTP errors, size mismatch,
      # missing Adobe creds). Plus a 🟢 startup ping each time it boots.
      # - ./telegram.json:/etc/telegram.json:ro
      #
      # Optional: writable file for OAuth Web App refresh-token persistence.
      # Create as `echo "{}" > oauth-state.json && chmod 600 oauth-state.json`
      # before first start, then mount it RW (not :ro).
      # - ./oauth-state.json:/etc/frameio-oauth-state.json
    ports:
      # Bind to localhost only — expose publicly via a reverse proxy / tunnel
      # (Cloudflare Tunnel, Caddy, etc.), not by opening the host's LAN interface.
      # On Unraid with a dedicated br0 IP you can drop this block entirely and
      # point the tunnel straight at the container IP:8000.
      - "127.0.0.1:8000:8000"
    networks:
      - camera_net
    restart: unless-stopped
    # Internet-facing service — drop all caps (it only needs outbound HTTPS +
    # file writes via volume perms) and block privilege escalation.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  camera_net:
    driver: bridge

volumes:
  camera_data:
